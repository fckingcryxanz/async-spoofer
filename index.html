<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Async</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Базовое скрытие */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ЭКРАН ЛОГИНА -->
    <div id="login-container" class="login-page">
        <div class="auth-card">
            <h2>Async Portal</h2>
            <input type="text" id="license-key" class="modern-input" placeholder="Введите ключ">
            <button id="login-btn" class="modern-btn">Войти</button>
        </div>
    </div>

    <!-- ОСНОВНАЯ ПАНЕЛЬ -->
    <div id="app-container" class="hidden">
        <div class="app-wrapper">
            <aside class="sidebar">
                <!-- Твой сайдбар -->
                <div class="nav-item active" data-page="dashboard">Dashboard</div>
                <div class="nav-item" data-page="tutorial">Tutorial</div>
                <div class="nav-item" data-page="studio">Studio</div>
            </aside>
            <main id="view-port">
                <h1>Главная</h1>
            </main>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
