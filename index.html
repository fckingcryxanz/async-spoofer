<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Async</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Базовое скрытие */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- ЭТА ШТОРКА ЗАКРЫВАЕТ ВСЁ, ПОКА ТЫ НЕ ВОЙДЕШЬ -->
<div id="auth-gate" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #050505; display: flex; justify-content: center; align-items: center;">
    <div style="text-align: center; color: white;">
        <h2 style="margin-bottom: 20px; font-family: sans-serif;">Async Login</h2>
        <input type="text" id="key-input" placeholder="Введите ключ" style="padding: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: white;">
        <button id="gate-btn" style="padding: 10px 20px; background: #b967ff; border: none; color: white; border-radius: 5px; cursor: pointer;">Войти</button>
    </div>
</div>
</body>
</html>
