<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>async-web</title>
    
    <!-- Обновили аватарку сайта на твой новый фиолетовый логотип -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L41NZ4nD/logo.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="app-container">
        <!-- Сайдбар панели управления -->
        <aside class="sidebar">
            <div class="sidebar-logo-block">
                <img src="https://i.postimg.cc/L41NZ4nD/logo.png" alt="Async Logo" class="custom-sidebar-logo">
                <span class="sidebar-brand-text">Async</span>
            </div>

            <div class="nav-group">
                <label>MAIN</label>
                <div class="nav-item active" data-page="dashboard" id="tab-dashboard">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
                    </div>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-page="tutorial" id="tab-tutorial">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-14 9V3z"/></svg>
                    </div>
                    <span>Tutorial</span>
                </div>
                <div class="nav-item" data-page="studio" id="tab-studio">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    </div>
                    <span>Studio</span>
                </div>
            </div>

            <div class="nav-group">
                <label>CONFIG</label>
                <div class="nav-item" data-page="hub" id="tab-hub">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    </div>
                    <span>Hub</span>
                </div>
                <div class="nav-item" data-page="settings" id="tab-settings">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </div>
                    <span>Settings</span>
                </div>
            </div>
        </aside>

        <!-- Главный контейнер, куда роутер подгружает страницы панели -->
        <main id="view-port">
            <!-- Сюда динамически инжектится HTML-код страниц через router.js -->
        </main>
    </div>

    <!-- Единая точка запуска авторизации и маршрутизации сайта -->
    <script type="module">
        import { checkAuthAndRoute } from './js/auth.js';
        import './js/router.js'; 

        document.addEventListener('DOMContentLoaded', () => {
            // При загрузке страницы проверяем сессию Discord OAuth2
            checkAuthAndRoute();
        });
    </script>
</body>
</html>
